<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Message sent — Rahul Babu</title>
<meta name="description" content="Your message landed safely. Rahul replies within 48 hours.">
<link rel="canonical" href="https://rahulbk.com/thanks">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ec; --bg-2: #ffffff;
  --ink: #0b0b0b; --ink-dim: #4c4a46; --ink-faint: #8a857b;
  --accent: #d94414; --accent-2: #a2631f;
  --line: rgba(11, 11, 11, 0.08);
  --display: 'Instrument Serif', 'Fraunces', 'Times New Roman', serif;
  --body: 'Plus Jakarta Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--ink);
  font-family: var(--body);
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
  background-image:
    radial-gradient(ellipse 900px 500px at 12% -5%, rgba(217, 68, 20, 0.08), transparent 60%),
    radial-gradient(ellipse 800px 520px at 92% 102%, rgba(162, 99, 31, 0.07), transparent 60%);
  background-attachment: fixed;
}
main { max-width: 640px; }
.tag {
  font-family: var(--mono); font-size: 12px; color: var(--accent);
  letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 28px;
  display: flex; align-items: center; gap: 14px;
}
.tag::before { content:''; display:inline-block; width: 32px; height: 1px; background: var(--accent); }
h1 {
  font-family: var(--display); font-weight: 300;
  font-size: clamp(42px, 6vw, 72px); letter-spacing: -0.025em;
  line-height: 0.98; margin-bottom: 28px;
}
h1 em { font-style: italic; color: var(--accent-2); font-weight: 500; }
p { color: var(--ink-dim); font-size: 18px; line-height: 1.6; margin-bottom: 28px; max-width: 520px; }
.links { display: flex; gap: 14px; flex-wrap: wrap; }
a.btn {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.1em; padding: 14px 26px;
  text-decoration: none; text-transform: uppercase;
  border: 1px solid var(--line); color: var(--ink);
  transition: all 0.25s;
}
a.btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
a.btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
a.btn.primary:hover { background: transparent; color: var(--accent); }
</style>
</head>
<body>
<main>
  <div class="tag">Message sent</div>
  <h1>Landed. I'll reply <em>within 48 hours</em>.</h1>
  <p>Meanwhile, if you want to skip the email ping-pong, grab 15 minutes directly on my calendar.</p>
  <div class="links">
    <a class="btn primary" href="https://cal.com/rahulbabu" target="_blank" rel="noopener">Book 15 min ↗</a>
    <a class="btn" href="/">← Back to portfolio</a>
    <a class="btn" href="/build-together">Try the AI planner ↗</a>
  </div>
</main>
<script defer src="/_vercel/insights/script.js"></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
